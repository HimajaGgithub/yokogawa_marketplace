<!DOCTYPE html>
<html>

<head>
    <title>Marketplace</title>
    <meta charset="utf-8" />   <!--It is necessary to use the UTF-8 encoding with plotly graphics to get e.g. negative signs to render correctly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
    <h1>Welcome to the Marketplace!</h1>
    {{ budget_calculations | safe }}

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        async function login(email, password) {
            fetch("/users/login", {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ "email_id": email, password: password })
            }).then(res => {
                if (res.ok) {
                    let csrf_token = getCookie("csrf_access_token");
                    fetch("/users/listing-prompts", {
                         method: "GET",
                         headers: {'X-CSRF-TOKEN': csrf_token},
                    }).then(res => res.json()).then(res => console.log(res));

                    const csrfToken = getCookie('csrf_access_token');
                    const ws = new WebSocket(
                        `ws://localhost:8000/messages?csrf_token=${encodeURIComponent(csrfToken)}`,
                    );

                    ws.onopen = (event) => {
                        console.log("WebSocket connection opened successfully.");
                    };

                    ws.onclose = (event) => {
                        console.log("WebSocket connection closed.");
                    };

                    ws.onerror = (error) => {
                        console.error("WebSocket error:", error);
                    };

                    return res.json();
                }
            });
        }
    </script>
</body>

</html>
