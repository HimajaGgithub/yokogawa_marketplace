    image: oem-image
    container_name: oem-container
    env_file:
      - .env
      - .env.docker
      - .env.oem
    ports:
      - "8006:8006"
    depends_on:
      marketplace:
        condition: service_healthy

  fleet_2:
    build:
      context: .
