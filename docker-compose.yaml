    container_name: manufacturer_2-container
    env_file:
      - .env
      - .env.docker
      - .env.manufacturer_2
    ports:
      - "8005:8005"
    depends_on:
      marketplace:
        condition: service_healthy

  oem:
    build:
      context: .
