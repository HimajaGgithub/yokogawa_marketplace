services:
  marketplace:
    build:
      context: .
      dockerfile: ./dist/marketplace/Dockerfile
    image: marketplace-image
    container_name: marketplace-container
    env_file:
      - .env
      - .env.docker
      - .env.marketplace
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; urllib.request.urlopen('http://localhost:8000'); sys.exit(0)\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  manufacturer:
    build:
      context: .
      dockerfile: ./dist/manufacturer/Dockerfile
    image: manufacturer-image
    container_name: manufacturer-container
    env_file:
      - .env
      - .env.docker
      - .env.manufacturer
    ports:
      - "8001:8001"
    depends_on:
      marketplace:
        condition: service_healthy

  recycler:
    build:
      context: .
      dockerfile: ./dist/recycler/Dockerfile
    image: recycler-image
    container_name: recycler-container
    env_file:
      - .env
      - .env.docker
      - .env.recycler
    ports:
      - "8002:8002"
    depends_on:
      marketplace:
        condition: service_healthy

  recycler_2:
    build:
      context: .
      dockerfile: ./dist/recycler_2/Dockerfile
